<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" />
    <title>TABIT 여행 조건 입력</title>
</head>



<body>
    <h1>TABIT</h1>
    <p>나에게 맞는 일본 여행지를 찾아보세요.</p>

    <label for="budget">예산</label>
    <input id="budget" type="number" placeholder="예: 1000000" />

    <label for="days">여행 기간</label>
    <select id="days">
        <option value="2">2일</option>
        <option value="3">3일</option>
        <option value="4">4일</option>
    </select>
<br /><br />

<label for="companion">동행 유형</label>
<select id="companion">
    <option value="solo">혼자</option>
    <option value="friend">친구</option>
    <option value="couple">연인</option>
    <option value="family">가족</option>
</select>

<br /><br />

<p>관심사</p>

<label>
    <input type="checkbox" name="interest" value="food" />
    맛집
</label>

<label>
    <input type="checkbox" name="interest" value="nature" />
    자연
</label>

<label>
    <input type="checkbox" name="interest" value="shopping">
    쇼핑
</label>

<label>
    <input type="checkbox" name="interest" value="culture">
    문화
</label>

<br /><br />

<label for="travel-style">여행 스타일</label>
<select id="travel-style">
    <option value="relaxed">여유롭게</option>
    <option value="balanced">보통</option>
    <option value="packed">알차게</option>
</select>

<br /><br />


    <button id="recommend-button" type="button">여행지 추천</button>
    <div id="result"></div>
    <script src="script.js"></script>
</body>
</html>
